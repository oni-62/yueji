<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>微信仿真界面</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;}
body{background:#f0f1f3;min-height:100vh;}

/* 手机全屏容器 */
.phone-container{
    width:100%;
    max-width:375px;
    height:100vh;
    margin:0 auto;
    background:#fff;
    position:relative;
    overflow:hidden;
}

/* 顶部状态栏 */
.status-bar{
    height:24px;
    background:#128C7E;
    color:#fff;
    font-size:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 15px;
}

/* 页面通用头部 */
.page-header{
    height:46px;
    background:#128C7E;
    color:#fff;
    font-size:19px;
    font-weight:500;
    line-height:46px;
    padding:0 15px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-shrink:0;
}
.back-page{
    font-size:17px;
    cursor:pointer;
}

/* 首页标题 */
.list-header{
    height:46px;
    background:#128C7E;
    color:#fff;
    font-size:19px;
    font-weight:500;
    line-height:46px;
    padding-left:15px;
}

/* 主聊天列表区域 预留底部导航高度 */
.chat-list{
    height:calc(100% - 120px);
    overflow-y:auto;
    background:#ffffff;
}
.list-item{
    display:flex;
    align-items:center;
    padding:13px 15px;
    border-bottom:1px solid #f2f2f2;
    cursor:pointer;
}
.list-item:active{
    background:#e9e9e9;
}
.list-avatar{
    width:52px;
    height:52px;
    border-radius:8px;
    object-fit:cover;
}
.list-info{
    margin-left:12px;
    flex:1;
}
.list-name{
    font-size:16px;
    color:#111;
    margin-bottom:3px;
}
.list-lastmsg{
    font-size:13px;
    color:#999;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:220px;
}

/* 主页面底部微信四栏图标导航 */
.main-tab{
    width:100%;
    height:50px;
    background:#fff;
    border-top:1px solid #e5e5e5;
    position:absolute;
    bottom:0;
    left:0;
    display:flex;
    z-index:5;
}
.tab-item{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:#999;
    font-size:11px;
    cursor:pointer;
}
.tab-item.active{
    color:#128C7E;
}
.tab-icon{
    font-size:20px;
    margin-bottom:3px;
}

/* 聊天弹窗页面 */
.chat-dialog{
    width:100%;
    height:100%;
    position:absolute;
    top:0;
    left:0;
    background:#ebebeb;
    display:none;
    flex-direction:column;
    z-index:20;
}
/* 聊天顶部返回栏 */
.dialog-top{
    height:46px;
    background:#128C7E;
    color:#fff;
    display:flex;
    align-items:center;
    padding:0 10px;
    flex-shrink:0;
}
.back-btn{
    font-size:17px;
    padding:0 8px;
    cursor:pointer;
}
.dialog-title{
    font-size:17px;
    font-weight:500;
}
/* 聊天内容区域 留出输入框高度 */
.msg-wrap{
    flex:1;
    overflow-y:auto;
    padding:12px;
}
/* 底部回复输入框 */
.send-box{
    height:56px;
    background:#f5f5f5;
    border-top:1px solid #dddddd;
    display:flex;
    align-items:center;
    padding:0 12px;
    flex-shrink:0;
}
.send-box input{
    flex:1;
    height:38px;
    border:1px solid #ddd;
    border-radius:20px;
    padding:0 16px;
    outline:none;
    font-size:14px;
}
.send-box button{
    margin-left:10px;
    height:38px;
    padding:0 18px;
    background:#128C7E;
    color:#fff;
    border:none;
    border-radius:20px;
    cursor:pointer;
}
/* 时间分割线 */
.time-line{
    text-align:center;
    font-size:12px;
    color:#999;
    margin:10px 0;
}
/* 对方气泡：丁美竹 白色左气泡 */
.msg-other{
    display:flex;
    margin:15px 0;
}
.msg-other img{
    width:42px;
    height:42px;
    border-radius:6px;
    object-fit:cover;
}
.msg-other .text-box{
    background:#ffffff;
    padding:9px 12px;
    border-radius:7px;
    margin-left:8px;
    max-width:70%;
    font-size:15px;
}
/* 自己气泡：闺蜜 绿色右气泡 */
.msg-self{
    display:flex;
    justify-content:flex-end;
    margin:15px 0;
    align-items:flex-start;
}
.msg-self .text-box{
    background:#9EE276;
    padding:9px 12px;
    border-radius:7px;
    margin-right:8px;
    max-width:70%;
    font-size:15px;
}
.msg-self img{
    width:42px;
    height:42px;
    border-radius:6px;
    object-fit:cover;
}
/* 微信标准发送失败：红圈白底白色感叹号 */
.fail-icon{
    width:20px;
    height:20px;
    border-radius:50%;
    background:#f53838;
    color:#fff;
    font-size:14px;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-right:6px;
    margin-top:10px;
}

/* 发现页面 */
.find-page{
    width:100%;
    height:calc(100% - 50px);
    position:absolute;
    top:70px;
    left:0;
    background:#f4f4f4;
    display:none;
    overflow-y:auto;
}
.find-item{
    background:#fff;
    display:flex;
    align-items:center;
    padding:16px 15px;
    border-bottom:1px solid #eee;
    cursor:pointer;
}
.find-icon{
    width:28px;
    height:28px;
    font-size:22px;
    margin-right:12px;
}
.find-text{
    font-size:16px;
    flex:1;
}
.find-arrow{
    color:#ccc;
}

/* 朋友圈页面 */
.moments-page{
    width:100%;
    height:100%;
    position:absolute;
    top:0;
    left:0;
    background:#f4f4f4;
    display:none;
    flex-direction:column;
    z-index:30;
}
.moments-wrap{
    flex:1;
    overflow-y:auto;
}
/* 朋友圈头部封面 */
.moments-banner{
    width:100%;
    height:160px;
    background:#b2e2bb;
    position:relative;
}
.moments-avatar{
    position:absolute;
    right:15px;
    bottom:-35px;
    width:70px;
    height:70px;
    border-radius:6px;
    border:3px solid #fff;
    object-fit:cover;
}
.moments-name{
    position:absolute;
    right:95px;
    bottom:-20px;
    color:#fff;
    font-size:18px;
    font-weight:500;
}
/* 朋友圈动态条目 */
.moment-item{
    background:#fff;
    margin-top:10px;
    padding:15px;
}
.moment-top{
    display:flex;
    align-items:center;
    margin-bottom:8px;
}
.moment-ava{
    width:40px;
    height:40px;
    border-radius:6px;
    object-fit:cover;
    margin-right:10px;
}
.moment-uname{
    font-size:16px;
    color:#333;
    font-weight:500;
}
.moment-content{
    font-size:15px;
    color:#222;
    margin:8px 0;
}
.moment-img{
    width:120px;
    height:120px;
    background:#eee;
    border-radius:4px;
    margin-bottom:8px;
}
.moment-time{
    font-size:12px;
    color:#999;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.like-comment{
    font-size:13px;
    color:#666;
    cursor:pointer;
}
</style>
</head>
<body>

            <!-- 朋友圈动态2 丁美竹 -->
            <div class="moment-item">

                </div>
            </div>

            <!-- 朋友圈动态3 朋友 -->
            <div class="moment-item">
                <div class="moment-top">
                    <img class="moment-ava" src="images/user.jpg">
                    <div class="moment-uname">AnAn</div>
                </div>
                <div class="moment-content">两个包</div>
                <div class="moment-time">
                    <span>6月1日 20:30</span>
                    <span class="like-comment">点赞 · 评论</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 主界面底部微信四栏图标导航 -->
    <div class="main-tab">
        <div class="tab-item active" onclick="switchTab('chat')">
            <div class="tab-icon">💬</div>
            <span>微信</span>
        </div>
        <div class="tab-item" onclick="switchTab('contact')">
            <div class="tab-icon">👥</div>

        </div>
        <div class="tab-item" onclick="switchTab('find')">

            <span>发现</span>
        </div>
        <div class="tab-item" onclick="switchTab('mine')">

            <span>我</span>
        </div>
    </div>

    <!-- 聊天弹窗页面：自带底部回复输入框 -->
    <div class="chat-dialog" id="chatWindow">
        <div class="dialog-top">
            <span class="back-btn" onclick="closeChat()">←</span>
            <span class="dialog-title" id="chatTitle"></span>
        </div>
        <div class="msg-wrap" id="msgContainer"></div>
        <div class="send-box">
            <input type="text" id="inputMsg" placeholder="输入消息">
            <button onclick="sendMessage()">发送</button>
        </div>
    </div>
</div>

<script>

            <div class="msg-self">
                <div class="text-box">悦己医美吗？我听说好像那个医院出过事，你小心一点吧。</div>
                <img src="images/user.jpg">
            </div>

                <div class="text-box">据说是医院里有一个医生有点问题，但是好像已经被辞退了。</div>

                <img src="images/user.jpg">
            </div>

                <img src="images/meizhu.jpg">
                <div class="text-box">安心啦！我会注意的</div>
            </div>

            <div class="time-line">2026年6月3日 11:27</div>
            <div class="msg-self">
                <div class="text-box">小美，你今天问的咋样啦？</div>
                <img src="images/user.jpg">
            </div>
            <div class="msg-other">
                <img src="images/meizhu.jpg">
                <div class="text-box">我问过啦，感觉还不错，我下午4点去面诊，一会我吃完饭睡一觉再去</div>

};

let nowChatKey = "";
// 底部tab切换
function switchTab(type){
    document.querySelectorAll('.tab-item').forEach(item=>item.classList.remove('active'));
    event.currentTarget.classList.add('active');
    document.getElementById('findPage').style.display = type === 'find' ? 'block' : 'none';
}
// 打开朋友圈
function openMoments(){
    document.getElementById('momentsPage').style.display = 'flex';
}
// 关闭朋友圈
function closeMoments(){
    document.getElementById('momentsPage').style.display = 'none';
}
// 打开闺蜜聊天
function openChat(key){
    nowChatKey = key;
    document.getElementById("chatTitle").innerText = chatData[key].title;
    document.getElementById("msgContainer").innerHTML = chatData[key].content;
    document.getElementById("chatWindow").style.display = "flex";
}
// 返回主列表页面
function closeChat(){
    document.getElementById("chatWindow").style.display = "none";
}
// 发送消息功能
function sendMessage(){
    let input = document.getElementById("inputMsg");
    let text = input.value.trim();
    if(text === "") return;
    let wrap = document.getElementById("msgContainer");
    let avatarSrc = "images/user.jpg";
    let newMsg = document.createElement("div");
    newMsg.className = "msg-self";
    newMsg.innerHTML = `
        <div class="text-box">${text}</div>
        <img src="${avatarSrc}">
    `;
    wrap.appendChild(newMsg);
    wrap.scrollTop = wrap.scrollHeight;
    input.value = "";
}
</script>
</body>
