<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>悦己医美 - 新氧风格首页</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif;}
body{background:#f7f8fa;color:#333;}

/* 顶部导航 */
.header{width:100%;height:70px;background:#fff;border-bottom:1px solid #eee;position:fixed;top:0;left:0;z-index:999;}
.nav{max-width:1100px;margin:0 auto;height:70px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:24px;font-weight:bold;color:#ff5a7d;}
.nav-list{display:flex;list-style:none;gap:30px;}
.nav-list a{text-decoration:none;color:#333;font-size:15px;}
.nav-list a:hover{color:#ff5a7d;}

/* 登录注册 小按钮 */
.login-group{display:flex;gap:8px;margin-left:15px;}
.login-btn,.reg-btn{
    padding:6px 12px;
    font-size:13px;
    border-radius:4px;
    cursor:pointer;
    border:none;
}
.login-btn{
    background:#ff5a7d;
    color:#fff;
}
.reg-btn{
    background:#fff;
    color:#ff5a7d;
    border:1px solid #ff5a7d;
}

/* 搜索框 */
.search{display:flex;align-items:center;}
.search input{width:180px;height:34px;padding:0 10px;border:1px solid #ddd;border-radius:4px 0 0 4px;outline:none;}
.search button{height:34px;padding:0 14px;background:#ff5a7d;color:#fff;border:none;border-radius:0 4px 4px 0;cursor:pointer;}

/* 轮播 */
.banner{width:100%;height:500px;background:url(images/xuanchuan.jpeg) center center no-repeat;background-size:cover;margin-top:70px;display:flex;align-items:center;padding-left:10%;color:#fff;}
.banner h1{
    font-size:55px;
    margin-bottom:15px;
    display:block;
    padding:10px 20px;
    border-radius:6px;
}
.banner p{
    font-size:18px;
    margin-bottom:20px;
    background:#f8bbd0;
    display:block;
    padding:6px 29px;
    border-radius:6px;
}
/* 项目区 */
.container{max-width:1100px;margin:40px auto;}
.title{font-size:22px;font-weight:bold;margin-bottom:20px;color:#333;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;}
.item{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
.item img{width:100%;height:160px;object-fit:cover;}
.item .info{padding:12px;}
.item .name{font-size:15px;color:#333;margin-bottom:5px;}
.item .price{color:#ff5a7d;font-weight:bold;}

/* 页脚 */
.footer{background:#2b2b2b;color:#fff;padding:30px 0;text-align:center;margin-top:60px;}
.footer p{color:#aaa;font-size:13px;margin-bottom:8px;}
.page-number {
  position: fixed;
  bottom: 15px;
  right: 20px;
  font-size: 14px;
  color: #ffffff;
}
</style>
</head>

<body>
<div class="header">
    <div class="nav">
        <div class="logo">悦己医美</div>
        <ul class="nav-list">
            <li><a href="index.html">首页</a></li>
            <li><a href="project.html">医美项目</a></li>
            <li><a href="doctor.html">医师团队</a></li>
            <li><a href="intro.html">医院简介</a></li>
            <li><a href="book.html">在线预约</a></li>
        </ul>

        <!-- 登录 + 注册 按钮 -->
        <div class="login-group">
            <button class="login-btn" onclick="location.href='login.html'">登录</button>
            <button class="reg-btn" onclick="location.href='login.html'">注册</button>
        </div>

        <div class="search">
            <input id="searchName"placeholder="搜索项目、医生、医院">
            <button onclick="searchPatient()">搜索</button>
        </div>
    </div>
</div>

<div class="banner">
    <div>
        <h1>专业医美 · 安心变美</h1>
        <p>正规资质 · 正品仪器 · 专业医师</p>
    </div>
</div>

<div class="container">
    <div class="title">热门医美项目</div>
    <div class="grid">
        <div class="item">
            <img src="images/guangzi.png" loading="lazy">
            <div class="info">
                <div class="name">光子嫩肤</div>
                <div class="price">¥299 起</div>
            </div>
        </div>
        <div class="item">
            <img src="images/boniaosuan.png" loading="lazy">
            <div class="info">
                <div class="name">玻尿酸填充</div>
                <div class="price">¥680 起</div>
            </div>
        </div>
        <div class="item">
            <img src="images/remaji.png" loading="lazy">
            <div class="info">
                <div class="name">热玛吉抗衰</div>
                <div class="price">¥5800 起</div>
            </div>
        </div>
        <div class="item">
            <img src="images/bushui.png" loading="lazy">
            <div class="info">
                <div class="name">水光补水</div>
                <div class="price">¥199 起</div>
            </div>
        </div>
    </div>
</div>

<div class="footer">
    <p>悦己医疗美容 ©2008-2025 版权所有</p>
    <p>门店地址：石嘉市桥西区建国路889号医美大楼</p>
    <p>咨询热线：400-888-9999</p>
<div class="page-number">(1/36)</div>
</div>

<script>
function searchPatient(){
    let name = document.getElementById("searchName").value.trim();
    if(name == ""){
        alert("请输入姓名");
        return;
    }
    location.href = "search.html?name=" + encodeURIComponent(name);
}</script>

</body>
</html>
